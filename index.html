<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Tutor</title>
</head>
<body style="font-family: sans-serif; padding: 24px; font-size: 18px; max-width: 600px; margin: auto;">
  <h1>Japanese Tutor</h1>

  <!-- Type OR use your keyboard's mic button in this box -->
  <textarea id="input" rows="2" style="width: 100%; font-size: 18px; padding: 10px;"
            placeholder="Type or tap the mic on your keyboard..."></textarea>

  <button id="sendBtn" style="font-size: 20px; padding: 14px 24px; margin-top: 10px;">Send</button>

  <!-- Conversation shows up here -->
  <div id="chat" style="margin-top: 20px; white-space: pre-wrap;"></div>

  <script>
    // ⬇️⬇️ CHANGE THIS to YOUR laptop's address from ipconfig (the 192.168.x.x one) ⬇️⬇️
    const BRAIN_URL = "https://clunky-guy-calorie.ngrok-free.dev/chat";

    const input   = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const chat    = document.getElementById('chat');
    let conversation = [];   // grows as you chat — this is the app's memory

    speechSynthesis.getVoices();
    console.log(voices.map((v, i) => i + ": " + v.name + " (" + v.lang + ")"));
    // Reads text aloud automatically — the speechSynthesis we proved works on day one.
    function speak(text) {
  speechSynthesis.cancel();

  // Don't read the romaji (single *asterisks*) aloud — that's for your eyes.
  let spoken = text.replace(/\*([^*]+)\*/g, '');
  spoken = spoken.replace(/[*_#`]/g, '');

  // Split into Japanese vs non-Japanese runs so each gets the right voice.
  const segments = spoken.match(/[\u3040-\u30ff\u4e00-\u9faf]+|[^\u3040-\u30ff\u4e00-\u9faf]+/g) || [spoken];

  const voices = speechSynthesis.getVoices();
  // Match YOUR downloaded voices by name:
  const enVoice = voices.find(v => v.name.includes('Ava'))
               || voices.find(v => v.lang === 'en-US');     // fallback if Ava not found
  const jaVoice = voices.find(v => v.name.includes('Kyoko'))
               || voices.find(v => v.lang === 'ja-JP');     // fallback if Kyoko not found

  segments.forEach(segment => {
    const trimmed = segment.trim();
    if (!trimmed) return;

    const u = new SpeechSynthesisUtterance(trimmed + ',');
    u.rate = 0.95;

    const isJa = /[\u3040-\u30ff\u4e00-\u9faf]/.test(trimmed);
    if (isJa) {
      if (jaVoice) u.voice = jaVoice;
      u.lang = 'ja-JP';
    } else {
      if (enVoice) u.voice = enVoice;
      u.lang = 'en-US';
    }

    speechSynthesis.speak(u);
  });
}

    async function send() {
  const message = input.value.trim();
  if (!message) return;

  speechSynthesis.speak(new SpeechSynthesisUtterance(''));  // wakes up iOS speech on the tap

  chat.textContent += "You: " + message + "\n\n";
  input.value = "";
  sendBtn.disabled = true;
  sendBtn.textContent = "Thinking...";

  conversation.push({ role: "user", content: message });   // remember what you said

  try {
    const res = await fetch(BRAIN_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })     // send the WHOLE history
    });
    const data = await res.json();
    const reply = data.reply;

    conversation.push({ role: "assistant", content: reply });  // remember the reply too

    chat.textContent += "Tutor: " + reply + "\n\n";
    speak(reply);
  } catch (err) {
    chat.textContent += "[Error reaching the brain: " + err.message + "]\n\n";
  }

  sendBtn.disabled = false;
  sendBtn.textContent = "Send";
}

    sendBtn.addEventListener('click', send);
    
  </script>
</body>
</html>
