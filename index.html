<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japanese Tutor</title>
</head>
<body style="font-family: sans-serif; padding: 24px; font-size: 18px; max-width: 600px; margin: auto;">
  <h1>Japanese Tutor</h1>

  <!-- Type OR use your keyboard's mic button in this box -->
  <textarea id="input" rows="2" style="width: 100%; font-size: 18px; padding: 10px;"
            placeholder="Type or tap the mic on your keyboard..."></textarea>

  <button id="sendBtn" style="font-size: 20px; padding: 14px 24px; margin-top: 10px;">Send</button>
  <button id="listVoicesBtn" style="font-size: 16px; padding: 10px 16px; margin-top: 10px;">List my voices</button>
  <div id="voiceList" style="margin-top: 12px; font-size: 14px; white-space: pre-wrap;"></div>

  <!-- Conversation shows up here -->
  <div id="chat" style="margin-top: 20px; white-space: pre-wrap;"></div>

  <script>
    // ⬇️⬇️ CHANGE THIS to YOUR laptop's address from ipconfig (the 192.168.x.x one) ⬇️⬇️
    const BRAIN_URL = "https://clunky-guy-calorie.ngrok-free.dev/chat";

    const input   = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const chat    = document.getElementById('chat');
    let conversation = [];   // grows as you chat — this is the app's memory

    speechSynthesis.getVoices();
    
    // Reads text aloud automatically — the speechSynthesis we proved works on day one.
   function speak(text) {
  speechSynthesis.cancel();

  // Strip romaji (single *asterisks*) and leftover markdown so they're not read aloud.
  let spoken = text.replace(/\*\*([^*]+)\*\*/g, '$1');  // keep **Japanese** content, drop the **
  spoken = spoken.replace(/\*([^*]+)\*/g, '');          // delete *romaji* entirely
  spoken = spoken.replace(/[*_#`]/g, '');               // strip leftover symbols

  // Split into Japanese vs non-Japanese runs.
  const segments = (spoken.match(/[\u3040-\u30ff\u4e00-\u9faf]+|[^\u3040-\u30ff\u4e00-\u9faf]+/g) || [spoken])
    .map(s => s.trim())
    .filter(s => s.length > 0);

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.name.includes('Moira')) || voices.find(v => v.lang === 'en-US');
  const jaVoice = voices.find(v => v.name.includes('Kyoko')) || voices.find(v => v.lang === 'ja-JP');

  function speak(text) {
  speechSynthesis.cancel();

  // Strip romaji (single *asterisks*) and leftover markdown so they're not read aloud.
  let spoken = text.replace(/\*\*([^*]+)\*\*/g, '$1');  // keep **Japanese** content, drop the **
  spoken = spoken.replace(/\*([^*]+)\*/g, '');          // delete *romaji* entirely
  spoken = spoken.replace(/[*_#`]/g, '');               // strip leftover symbols

  // Split into Japanese vs non-Japanese runs.
  const segments = (spoken.match(/[\u3040-\u30ff\u4e00-\u9faf]+|[^\u3040-\u30ff\u4e00-\u9faf]+/g) || [spoken])
    .map(s => s.trim())
    .filter(s => s.length > 0);

  const voices = speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.name.includes('Moira')) || voices.find(v => v.lang === 'en-US');
  const jaVoice = voices.find(v => v.name.includes('Kyoko')) || voices.find(v => v.lang === 'ja-JP');
  
  // Speak segments ONE AT A TIME — wait for each to finish before the next.
  // This avoids iOS dropping queued utterances.
  let i = 0;
  function speakNext() {
    if (i >= segments.length) return;
    const seg = segments[i];
    i++;

    const u = new SpeechSynthesisUtterance(seg);
    const isJa = /[\u3040-\u30ff\u4e00-\u9faf]/.test(seg);
    if (isJa) {
      if (jaVoice) u.voice = jaVoice;
      u.lang = 'ja-JP';
      u.rate = 0.9;   // slower Japanese for learning
    } else {
      if (enVoice) u.voice = enVoice;
      u.lang = 'en-US';
      u.rate = 1.1;   // faster English
    }

    u.onend = speakNext;   // when this finishes, speak the next one
    speechSynthesis.speak(u);
  }
  speakNext();
}
    async function send() {
  const message = input.value.trim();
  if (!message) return;

  speechSynthesis.speak(new SpeechSynthesisUtterance(''));  // wakes up iOS speech on the tap

  chat.textContent += "You: " + message + "\n\n";
  input.value = "";
  sendBtn.disabled = true;
  sendBtn.textContent = "Thinking...";

  conversation.push({ role: "user", content: message });   // remember what you said

  try {
    const res = await fetch(BRAIN_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: conversation })     // send the WHOLE history
    });
    const data = await res.json();
    const reply = data.reply;

    conversation.push({ role: "assistant", content: reply });  // remember the reply too

    chat.textContent += "Tutor: " + reply + "\n\n";
    speak(reply);
  } catch (err) {
    chat.textContent += "[Error reaching the brain: " + err.message + "]\n\n";
  }

  sendBtn.disabled = false;
  sendBtn.textContent = "Send";
}
    document.getElementById('listVoicesBtn').addEventListener('click', () => {
      const voices = speechSynthesis.getVoices();
      if (voices.length === 0) {
        document.getElementById('voiceList').textContent = "No voices loaded yet — tap again.";
        return;
      }
      const list = voices
        .map((v, i) => i + ": " + v.name + "  (" + v.lang + ")")
        .join("\n");
      document.getElementById('voiceList').textContent =
        "Found " + voices.length + " voices:\n\n" + list;
    });
    
    sendBtn.addEventListener('click', send);
    
  </script>
</body>
</html>
